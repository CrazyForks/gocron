replicaCount: 1

image:
  repository: gocronx/gocron
  tag: "" # defaults to Chart appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Database configuration
db:
  # sqlite, mysql, postgres
  engine: sqlite
  host: ""
  port: 0
  user: ""
  password: ""
  database: ./data/gocron.db
  prefix: ""
  charset: utf8
  maxIdleConns: 5
  maxOpenConns: 100

# Application configuration
app:
  name: "gocron"
  apiKey: ""
  apiSecret: ""
  allowIps: ""
  concurrencyQueue: 500
  enableTls: false

timezone: Asia/Shanghai

service:
  type: ClusterIP
  port: 5920

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: gocron.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 256Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}
