name: 🐛 Bug Report
description: Report a reproducible bug or unexpected behavior.
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have read the documentation and this is not a usage question.
          required: true
        - label: I have confirmed the bug exists on the latest release.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Configure task with '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include error messages if any.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: gocron Version
      description: Output of `gocron -v` or the release tag you are running.
      placeholder: "e.g. v1.6.1"
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Database
      options:
        - MySQL
        - PostgreSQL
        - SQLite
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS & Deployment
      description: OS, architecture, and deployment method (binary / Docker / Helm).
      placeholder: "e.g. Ubuntu 22.04 amd64, Docker"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, config snippets, or anything else that helps.
