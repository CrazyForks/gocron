name: ✨ Feature Request / 功能请求
description: Suggest a new feature or improvement. / 提议一个新功能或改进。
title: "[Feature]: "
labels: ["enhancement", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea clearly so we can evaluate it.
        感谢你的建议！请清晰描述你的想法，以便我们评估。

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites / 前置确认
      options:
        - label: I have searched existing [issues](https://github.com/gocronx-team/gocron/issues) and [discussions](https://github.com/gocronx-team/gocron/discussions) and this has not been requested. / 我已搜索过现有 issue 和 discussions，确认没有重复请求。
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / 要解决的问题
      description: What problem does this feature solve? What is the use case? / 这个功能要解决什么问题？使用场景是什么？
      placeholder: "I'm frustrated when... / 我遇到的困扰是……"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution / 建议的方案
      description: Describe what you'd like to happen. / 描述你希望实现的效果。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered / 考虑过的替代方案
      description: Any alternative solutions or workarounds you've considered. / 你考虑过的其他方案或临时变通办法。

  - type: textarea
    id: context
    attributes:
      label: Additional Context / 补充信息
      description: Mockups, references, or any other context. / 原型图、参考资料或其他背景信息。
