name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # pnpm version comes from the "packageManager" field in package.json
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/gocronx-admin/pnpm-lock.yaml

      - name: Install & Build
        working-directory: web/gocronx-admin
        run: |
          pnpm install --frozen-lockfile
          # build-only (vite) generates the gitignored auto-import type
          # declarations that a full `pnpm build` (vue-tsc) would otherwise
          # miss on a fresh checkout.
          pnpm build-only

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: web/gocronx-admin/dist/

  release:
    name: GoReleaser
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: web/gocronx-admin/dist/

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
